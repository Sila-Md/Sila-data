<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SILA WA BUN · Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0c10;
            color: #e5e9f0;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .login-box, .dashboard {
            background: #0f172a;
            border: 2px solid #2d4b7c;
            border-radius: 32px;
            padding: 2rem;
        }

        h1 {
            color: #7aa2f7;
            margin-bottom: 2rem;
            border-bottom: 1px solid #253b5c;
            padding-bottom: 1rem;
        }

        .pin-input {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 1rem;
            color: white;
            font-size: 1.2rem;
            width: 100%;
            margin: 1rem 0;
        }

        .btn {
            background: linear-gradient(145deg, #2563eb, #1e3a8a);
            border: none;
            border-radius: 40px;
            padding: 1rem 2rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #3f74d9;
            margin: 0.5rem;
        }

        .btn.secondary {
            background: #2d3748;
            border-color: #4a5568;
        }

        .nav-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #1a2538;
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid #2d4b7c;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #7aa2f7;
        }

        .visitor-list, .messages-list {
            max-height: 600px;
            overflow-y: auto;
            background: #1a2538;
            border-radius: 24px;
            padding: 1rem;
        }

        .visitor-item {
            background: #0f172a;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid #3b82f6;
        }

        .message-item {
            background: #0f172a;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .message-edit {
            width: 100%;
            min-height: 150px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 1rem;
            color: white;
            margin: 1rem 0;
            font-family: monospace;
        }

        .hidden {
            display: none;
        }

        .success {
            color: #4ade80;
            margin-top: 1rem;
        }

        .error {
            color: #f87171;
        }

        .tab-content {
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginForm" class="login-box">
            <h1>🔐 Admin Login</h1>
            <p>Enter admin PIN to access dashboard</p>
            <input type="password" id="pinInput" class="pin-input" placeholder="****" maxlength="8">
            <button class="btn" id="loginBtn">Login</button>
            <p id="loginError" class="error" style="margin-top: 1rem;"></p>
        </div>

        <!-- Dashboard (hidden by default) -->
        <div id="dashboard" class="dashboard hidden">
            <h1>📊 Admin Dashboard</h1>
            
            <div class="nav-bar">
                <button class="btn" onclick="showSection('stats')">📈 Statistics</button>
                <button class="btn" onclick="showSection('visitors')">👁️ Visitors</button>
                <button class="btn" onclick="showSection('messages')">✏️ Messages</button>
                <button class="btn" onclick="showSection('settings')">⚙️ Settings</button>
                <button class="btn secondary" onclick="logout()">🚪 Logout</button>
            </div>

            <!-- Stats Section -->
            <div id="statsSection" class="tab-content">
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card">
                        <div>Total Visitors</div>
                        <div class="stat-value" id="totalVisitors">-</div>
                    </div>
                    <div class="stat-card">
                        <div>Today's Visitors</div>
                        <div class="stat-value" id="todayVisitors">-</div>
                    </div>
                    <div class="stat-card">
                        <div>Countries</div>
                        <div class="stat-value" id="uniqueCountries">-</div>
                    </div>
                    <div class="stat-card">
                        <div>Messages</div>
                        <div class="stat-value" id="totalMessages">-</div>
                    </div>
                </div>
            </div>

            <!-- Visitors Section -->
            <div id="visitorsSection" class="tab-content hidden">
                <h2>📋 Recent Visitors</h2>
                <div class="visitor-list" id="visitorsList"></div>
            </div>

            <!-- Messages Section -->
            <div id="messagesSection" class="tab-content hidden">
                <h2>✏️ Edit Email Messages</h2>
                <select id="emailSelect" class="pin-input" style="margin-bottom: 1rem;">
                    <option value="">Select Email</option>
                </select>
                
                <div id="messageEditor" class="hidden">
                    <label>Message (use [TARGET_NUMBER] for target's number):</label>
                    <textarea id="messageContent" class="message-edit"></textarea>
                    <button class="btn" onclick="saveMessage()">Save Changes</button>
                    <p id="saveSuccess" class="success hidden">✓ Message updated!</p>
                </div>
                
                <div class="messages-list" id="messagesList" style="margin-top: 2rem;">
                    <!-- List of all messages -->
                </div>
            </div>

            <!-- Settings Section -->
            <div id="settingsSection" class="tab-content hidden">
                <h2>🔑 Change Admin PIN</h2>
                <input type="password" id="currentPin" class="pin-input" placeholder="Current PIN">
                <input type="password" id="newPin" class="pin-input" placeholder="New PIN (4-8 characters)">
                <button class="btn" onclick="changePin()">Update PIN</button>
                <p id="pinError" class="error"></p>
            </div>
        </div>
    </div>

    <script>
        let messages = [];

        // Check login status
        fetch('/api/admin/check')
            .then(res => res.json())
            .then(data => {
                if (data.isAdmin) {
                    document.getElementById('loginForm').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    loadDashboard();
                }
            });

        // Login
        document.getElementById('loginBtn').onclick = async () => {
            const pin = document.getElementById('pinInput').value;
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pin })
            });
            
            if (res.ok) {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadDashboard();
            } else {
                document.getElementById('loginError').textContent = '❌ Invalid PIN';
            }
        };

        async function loadDashboard() {
            loadStats();
            loadVisitors();
            loadMessages();
        }

        async function loadStats() {
            const res = await fetch('/api/admin/stats');
            const stats = await res.json();
            
            document.getElementById('totalVisitors').textContent = stats.totalVisitors;
            document.getElementById('todayVisitors').textContent = stats.todayVisitors;
            document.getElementById('uniqueCountries').textContent = stats.uniqueCountries;
            
            const msgRes = await fetch('/api/admin/messages');
            const msgs = await msgRes.json();
            document.getElementById('totalMessages').textContent = msgs.length;
        }

        async function loadVisitors() {
            const res = await fetch('/api/admin/visitors');
            const visitors = await res.json();
            
            const list = document.getElementById('visitorsList');
            list.innerHTML = visitors.map(v => `
                <div class="visitor-item">
                    <strong>🕐 ${new Date(v.lastVisit).toLocaleString()}</strong><br>
                    📍 ${v.location?.country || 'Unknown'}, ${v.location?.city || ''}<br>
                    🖥️ ${v.userAgent?.substring(0, 60)}...<br>
                    📱 Visits: ${v.visitCount} | Pages: ${v.pages?.length || 0}<br>
                    🔗 First: ${new Date(v.firstVisit).toLocaleDateString()}
                </div>
            `).join('');
        }

        async function loadMessages() {
            const res = await fetch('/api/admin/messages');
            messages = await res.json();
            
            // Populate select
            const select = document.getElementById('emailSelect');
            select.innerHTML = '<option value="">Select Email to Edit</option>' + 
                messages.map(m => `<option value="${m.email}">${m.email}</option>`).join('');
            
            // Show all messages
            const list = document.getElementById('messagesList');
            list.innerHTML = messages.map(m => `
                <div class="message-item">
                    <strong>📧 ${m.email}</strong><br>
                    <small style="color:#7aa2f7;">${m.category || 'general'}</small>
                    <p style="margin-top:0.5rem; background:#1e293b; padding:1rem; border-radius:12px;">
                        ${m.content.substring(0, 150)}...
                    </p>
                </div>
            `).join('');
        }

        document.getElementById('emailSelect').onchange = (e) => {
            const email = e.target.value;
            const message = messages.find(m => m.email === email);
            
            if (message) {
                document.getElementById('messageEditor').classList.remove('hidden');
                document.getElementById('messageContent').value = message.content;
            } else {
                document.getElementById('messageEditor').classList.add('hidden');
            }
        };

        async function saveMessage() {
            const email = document.getElementById('emailSelect').value;
            const content = document.getElementById('messageContent').value;
            
            const res = await fetch(`/api/admin/messages/${encodeURIComponent(email)}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            
            if (res.ok) {
                document.getElementById('saveSuccess').classList.remove('hidden');
                setTimeout(() => document.getElementById('saveSuccess').classList.add('hidden'), 2000);
                loadMessages();
            }
        }

        async function changePin() {
            const current = document.getElementById('currentPin').value;
            const newPin = document.getElementById('newPin').value;
            
            if (newPin.length < 4 || newPin.length > 8) {
                document.getElementById('pinError').textContent = 'PIN must be 4-8 characters';
                return;
            }
            
            const res = await fetch('/api/admin/change-pin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ currentPin: current, newPin })
            });
            
            if (res.ok) {
                document.getElementById('pinError').style.color = '#4ade80';
                document.getElementById('pinError').textContent = '✓ PIN updated successfully';
                document.getElementById('currentPin').value = '';
                document.getElementById('newPin').value = '';
            } else {
                document.getElementById('pinError').style.color = '#f87171';
                document.getElementById('pinError').textContent = '❌ Current PIN is incorrect';
            }
        }

        function showSection(section) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(section + 'Section').classList.remove('hidden');
            
            if (section === 'visitors') loadVisitors();
            if (section === 'messages') loadMessages();
            if (section === 'stats') loadStats();
        }

        async function logout() {
            await fetch('/api/admin/logout', { method: 'POST' });
            location.reload();
        }
    </script>
</body>
</html>
